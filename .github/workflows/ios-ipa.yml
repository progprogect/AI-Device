# Сборка unsigned IPA для установки через Sideloadly (бесплатный Apple ID).
# Артефакт: Actions → последний run → esp-sense-ipa → esp_sense_app.ipa

name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - '.github/workflows/ios-ipa.yml'

jobs:
  build-ipa:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: app

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26
        run: |
          if [ -d "/Applications/Xcode_26.app" ]; then
            sudo xcode-select -s /Applications/Xcode_26.app/Contents/Developer
            # Xcode 26 may be present without the iOS platform bundle.
            xcodebuild -downloadPlatform iOS || true
          elif [ -d "/Applications/Xcode_26.0.app" ]; then
            sudo xcode-select -s /Applications/Xcode_26.0.app/Contents/Developer
            xcodebuild -downloadPlatform iOS || true
          else
            echo "Using default Xcode: $(xcode-select -p)"
          fi
          xcodebuild -version || true
          xcodebuild -showsdks || true

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build archive (unsigned)
        run: flutter build ipa --release --no-codesign

      - name: Package IPA for Sideloadly
        run: |
          APP_PATH=$(find build/ios/archive -name "*.app" -path "*/Products/Applications/*" | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "Runner.app not found in archive"
            find build/ios -name "*.app"
            exit 1
          fi
          mkdir -p Payload build/ios/ipa
          cp -r "$APP_PATH" Payload/
          zip -qr build/ios/ipa/esp_sense_app.ipa Payload
          rm -rf Payload
          ls -lh build/ios/ipa/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: esp-sense-ipa
          path: app/build/ios/ipa/esp_sense_app.ipa
          retention-days: 30
