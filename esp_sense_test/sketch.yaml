profiles:
  xiao_esp32s3_sense:
    fqbn: esp32:esp32:XIAO_ESP32S3
    platforms:
      - platform: esp32:esp32
    libraries: []
    port: auto
    programmer: ""
    port_config:
      baudrate: 115200
    build_properties:
      - "build.partitions=huge_app"
      - "PSRAM=opi"

default_profile: xiao_esp32s3_sense
